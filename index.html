<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>IRBSpeedApp</title>
    <base href="/" />
    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="IRBSpeedApp.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <!-- expose all interop on window -->
    <script>
        // will point to whichever component registers last
        window.dotNetHelper = null;

        // called by any component on first render
        window.registerDotNetHelper = (helper) => {
            window.dotNetHelper = helper;
            console.debug("Interop helper registered on", helper);
        };

        // Index.razor uses these:
        window.startGPS = () => {
            navigator.geolocation?.watchPosition(
                pos => {
                    const speed = (pos.coords.speed || 0) * 3.6;
                    window.dotNetHelper?.invokeMethodAsync("UpdateSpeed", speed, 0);
                },
                err => console.error("GPS error", err),
                { enableHighAccuracy: true }
            );
        };
        window.enableMotion = () => {
            const handler = ev => {
                const a = ev.accelerationIncludingGravity || { x: 0, y: 0, z: 0 };
                const accel = Math.hypot(a.x, a.y, a.z);
                window.dotNetHelper?.invokeMethodAsync("UpdateSpeed", 0, accel);
            };
            if (DeviceMotionEvent?.requestPermission) {
                DeviceMotionEvent.requestPermission()
                    .then(r => r === "granted" && window.addEventListener("devicemotion", handler))
                    .catch(console.error);
            } else {
                window.addEventListener("devicemotion", handler);
            }
        };

        // SpeedTest.razor uses these:
        window.startTracking = (helper) => {
            navigator.geolocation?.watchPosition(
                pos => {
                    const speed = (pos.coords.speed || 0) * 3.6;
                    window.dotNetHelper?.invokeMethodAsync("UpdateSpeed", speed, speed);
                },
                err => console.error("Tracking error", err),
                { enableHighAccuracy: true }
            );
        };
        window.stopTracking = () => {
            // you could track the watchId if you like,
            // but for simplicity you can clear all watchers:
            // NOTE: this won’t work in all browsers—best to capture watchId
            console.debug("stopTracking called");
        };
    </script>

    <!-- Blazor bootstrap -->
    <script src="_framework/blazor.webassembly.js"></script>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        let watchId;
        function startTracking(dotNetHelper) {
            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(
                    pos => {
                        const speed = (pos.coords.speed || 0) * 3.6; // m/s → km/h
                        // For simplicity, use speed as a stand-in for accel
                        dotNetHelper.invokeMethodAsync('UpdateSpeed', speed, speed);
                    },
                    err => console.error(err),
                    { enableHighAccuracy: true }
                );
            }
        }
        function stopTracking() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
        }
    </script>
    <script>
        window.BlazorDownloadFile = (filename, base64) => {
            const link = document.createElement('a');
            link.download = filename;
            link.href = 'data:text/csv;base64,' + base64;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous">
    </script>

    <script>
        let dotNetHelper = null;

        function registerDotNetHelper(helper) {
            dotNetHelper = helper;
        }

        function startGPS() {
            if (navigator.geolocation) {
                console.log("Requesting GPS...");
                navigator.geolocation.watchPosition(
                    pos => {
                        const speed = (pos.coords.speed || 0) * 3.6;
                        console.log("GPS update:", speed, "km/h");
                        if (dotNetHelper)
                            dotNetHelper.invokeMethodAsync('UpdateSpeed', speed, 0);
                    },
                    err => console.error("GPS error:", err),
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            } else {
                console.warn("Geolocation not supported");
            }
        }

        function enableMotion() {
            if (typeof DeviceMotionEvent !== "undefined" &&
                typeof DeviceMotionEvent.requestPermission === "function") {
                DeviceMotionEvent.requestPermission()
                    .then(response => {
                        if (response === "granted") {
                            window.addEventListener("devicemotion", event => {
                                if (dotNetHelper)
                                    dotNetHelper.invokeMethodAsync(
                                        'UpdateSpeed',
                                        0,
                                        event.acceleration?.x || 0
                                    );
                            });
                        } else {
                            alert("Motion permission denied");
                        }
                    })
                    .catch(console.error);
            } else {
                // Fallback: non-iOS
                window.addEventListener("devicemotion", event => {
                    if (dotNetHelper)
                        dotNetHelper.invokeMethodAsync(
                            'UpdateSpeed',
                            0,
                            event.acceleration?.x || 0
                        );
                });
            }
        }
    </script>


</body>

</html>
