<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>IRBSpeedApp</title>
    <base href="/" />
    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="IRBSpeedApp.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <!-- 🌐 JS Interop Helpers -->
    <script>
        let watchId;
        let dotNetHelper = null;

        function registerDotNetHelper(helper) {
            dotNetHelper = helper;
            console.log("✅ .NET helper registered");
        }

        function startTracking(helper) {
            try {
                dotNetHelper = helper;
                if (!navigator.geolocation) {
                    console.warn("Geolocation not supported");
                    return;
                }

                watchId = navigator.geolocation.watchPosition(
                    pos => {
                        const speed = (pos.coords.speed || 0) * 3.6;
                        try {
                            if (dotNetHelper)
                                dotNetHelper.invokeMethodAsync('UpdateSpeed', speed, speed);
                        } catch (err) {
                            console.error("❌ JS → .NET UpdateSpeed failed:", err);
                        }
                    },
                    err => console.error("❌ GPS error:", err),
                    { enableHighAccuracy: true }
                );
            } catch (e) {
                console.error("❌ startTracking error:", e);
            }
        }

        function stopTracking() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
        }

        function startGPS() {
            try {
                if (!navigator.geolocation) {
                    console.warn("Geolocation not supported");
                    return;
                }

                console.log("Requesting GPS...");
                navigator.geolocation.watchPosition(
                    pos => {
                        const speed = (pos.coords.speed || 0) * 3.6;
                        console.log("📡 GPS update:", speed, "km/h");
                        try {
                            if (dotNetHelper)
                                dotNetHelper.invokeMethodAsync('UpdateSpeed', speed, 0);
                        } catch (e) {
                            console.error("❌ GPS invoke failed:", e);
                        }
                    },
                    err => console.error("❌ GPS error:", err),
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            } catch (e) {
                console.error("❌ startGPS failed:", e);
            }
        }

        function enableMotion() {
            try {
                if (typeof DeviceMotionEvent !== "undefined" &&
                    typeof DeviceMotionEvent.requestPermission === "function") {

                    DeviceMotionEvent.requestPermission()
                        .then(response => {
                            if (response === "granted") {
                                window.addEventListener("devicemotion", event => {
                                    try {
                                        if (dotNetHelper)
                                            dotNetHelper.invokeMethodAsync(
                                                'UpdateSpeed',
                                                0,
                                                event.acceleration?.x || 0
                                            );
                                    } catch (e) {
                                        console.error("❌ Motion invoke failed:", e);
                                    }
                                });
                            } else {
                                alert("Motion permission denied");
                            }
                        })
                        .catch(e => console.error("❌ Motion permission request failed:", e));
                } else {
                    // Non-iOS fallback
                    window.addEventListener("devicemotion", event => {
                        try {
                            if (dotNetHelper)
                                dotNetHelper.invokeMethodAsync(
                                    'UpdateSpeed',
                                    0,
                                    event.acceleration?.x || 0
                                );
                        } catch (e) {
                            console.error("❌ Fallback motion invoke failed:", e);
                        }
                    });
                }
            } catch (e) {
                console.error("❌ enableMotion error:", e);
            }
        }
    </script>

    <!-- 📁 File Export -->
    <script>
        window.BlazorDownloadFile = (filename, base64) => {
            try {
                const link = document.createElement('a');
                link.download = filename;
                link.href = 'data:text/csv;base64,' + base64;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) {
                console.error("❌ File download error:", e);
            }
        };
    </script>

    <!-- 🧱 Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous">
    </script>
</body>

</html>
